<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍊 Gestión de Fruta</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚠️ REEMPLAZA ESTOS VALORES CON TU CONFIGURACIÓN DE FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyDBOsGoZ1HY_EXMYjZmk4ME1disF59pXts",
    authDomain: "gestion-fruta.firebaseapp.com",
    databaseURL: "https://gestion-fruta-default-rtdb.firebaseio.com",
    projectId: "gestion-fruta",
    storageBucket: "gestion-fruta.firebasestorage.app",
    messagingSenderId: "699285696126",
    appId: "1:699285696126:web:db2deb6b928468b23cb22f",
    measurementId: "G-01V4GNCQNK"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const PLANTAS = ["Nueva Aurora", "Tamaya", "Broom", "La Placa"];
  const CALIBRES = ["Sobre", "Grande", "Mediano", "Chico", "Pre", "Sin Cera", "Verde"];
  const ESPECIES = ["Naranjas", "Mandarinas", "Limones", "Clementinas"];

  const fmt = n => Number(n) || 0;
  const today = () => new Date().toISOString().slice(0, 10);
  function diasDesde(fecha) {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const d = new Date(fecha); d.setHours(0,0,0,0);
    return Math.floor((hoy - d) / 86400000);
  }

  // Estado local sincronizado con Firebase
  let lotes = {}, reservas = {}, ventas = {}, historial = {};
  let tabActual = "stock";
  let filtroPlanta = "Todas";

  // Escuchar cambios en tiempo real
  onValue(ref(db, "lotes"), s => { lotes = s.val() || {}; render(); });
  onValue(ref(db, "reservas"), s => { reservas = s.val() || {}; render(); });
  onValue(ref(db, "ventas"), s => { ventas = s.val() || {}; render(); });
  onValue(ref(db, "historial"), s => { historial = s.val() || {}; render(); });

  // ── ACCIONES ──

  window.addLote = async () => {
    const planta = document.getElementById("lPlanta").value;
    const especie = document.getElementById("lEspecie").value;
    const calibre = document.getElementById("lCalibre").value;
    const fecha = document.getElementById("lFecha").value;
    const valor = fmt(document.getElementById("lBins").value);
    if (!valor || !fecha) return alert("Ingresa cantidad y fecha");
    const modoKilos = window.modoKilos !== false;
    const bins = modoKilos ? Math.round(valor / 450 * 10) / 10 : valor;
    const kilos = modoKilos ? valor : Math.round(valor * 450);
    await push(ref(db, "lotes"), { planta, especie, calibre, fecha, bins, kilos });
    await push(ref(db, "historial"), { tipo: "ingreso", texto: `Ingreso: ${planta} · ${especie} ${calibre} · ${modoKilos ? kilos+' kg = ' : ''}${bins} bins · ${fecha}`, ts: Date.now() });
    document.getElementById("lBins").value = "";
    document.getElementById("lBinsPreview").textContent = "";
  };

  window.addReserva = async () => {
    const cliente = document.getElementById("rCliente").value.trim();
    const planta = document.getElementById("rPlanta").value;
    const especie = document.getElementById("rEspecie").value;
    const calibre = document.getElementById("rCalibre").value;
    const bins = fmt(document.getElementById("rBins").value);
    const fechaEntrega = document.getElementById("rFecha").value;
    if (!cliente || !bins) return alert("Ingresa cliente y bins");
    // Validar stock disponible en esa planta (lotes sin planta cuentan para cualquier planta)
    const stockR = Object.values(lotes).filter(l => (!l.planta || l.planta===planta) && l.especie===especie && l.calibre===calibre).reduce((a,l)=>a+l.bins,0);
    const reservadoR = Object.values(reservas).filter(r => (!r.planta || r.planta===planta) && r.especie===especie && r.calibre===calibre).reduce((a,r)=>a+r.bins,0);
    const vendidoR = Object.values(ventas).filter(v => (!v.planta || v.planta===planta) && v.especie===especie && v.calibre===calibre).reduce((a,v)=>a+v.bins,0);
    const disponibleR = stockR - reservadoR - vendidoR;
    if (stockR === 0) return alert(`⚠️ No tienes ${especie} ${calibre} en ${planta}.`);
    if (bins > disponibleR) return alert(`⚠️ Solo tienes ${disponibleR} bins disponibles de ${especie} ${calibre} en ${planta}.`);
    await push(ref(db, "reservas"), { cliente, planta, especie, calibre, bins, fechaEntrega });
    await push(ref(db, "historial"), { tipo: "reserva", texto: `Reserva: ${cliente} · ${planta} · ${especie} ${calibre} · ${bins} bins · entrega ${fechaEntrega}`, ts: Date.now() });
    document.getElementById("rCliente").value = "";
    document.getElementById("rBins").value = "";
  };

  window.despachar = async (id) => {
    const r = reservas[id];
    if (!r) return;
    await push(ref(db, "ventas"), { descripcion: `Despacho: ${r.cliente}`, especie: r.especie, calibre: r.calibre, bins: r.bins });
    await push(ref(db, "historial"), { tipo: "despacho", texto: `Despachado: ${r.cliente} · ${r.especie} ${r.calibre} · ${r.bins} bins`, ts: Date.now() });
    await remove(ref(db, `reservas/${id}`));
  };

  window.addVenta = async () => {
    const descripcion = document.getElementById("vDesc").value.trim();
    const especie = document.getElementById("vEspecie").value;
    const calibre = document.getElementById("vCalibre").value;
    const bins = fmt(document.getElementById("vBins").value);
    if (!descripcion || !bins) return alert("Ingresa descripción y bins");
    // Validar stock disponible
    const stockEsp = Object.values(lotes).filter(l => l.especie===especie && l.calibre===calibre).reduce((a,l)=>a+l.bins,0);
    const reservadoEsp = Object.values(reservas).filter(r => r.especie===especie && r.calibre===calibre).reduce((a,r)=>a+r.bins,0);
    const vendidoEsp = Object.values(ventas).filter(v => v.especie===especie && v.calibre===calibre).reduce((a,v)=>a+v.bins,0);
    const disponibleEsp = stockEsp - reservadoEsp - vendidoEsp;
    if (stockEsp === 0) return alert(`⚠️ No tienes ${especie} ${calibre} en stock.`);
    if (bins > disponibleEsp) return alert(`⚠️ Solo tienes ${disponibleEsp} bins disponibles de ${especie} ${calibre}.\n(Stock: ${stockEsp} · Reservado: ${reservadoEsp} · Vendido hoy: ${vendidoEsp})`);
    await push(ref(db, "ventas"), { descripcion, especie, calibre, bins });
    await push(ref(db, "historial"), { tipo: "venta", texto: `Venta: ${descripcion} · ${especie} ${calibre} · ${bins} bins`, ts: Date.now() });
    document.getElementById("vDesc").value = "";
    document.getElementById("vBins").value = "";
  };

  window.eliminarVenta = async (id) => {
    if (!confirm("¿Eliminar esta venta?")) return;
    const v = ventas[id];
    await remove(ref(db, `ventas/${id}`));
    await push(ref(db, "historial"), { tipo: "correccion", texto: `Venta eliminada: ${v.descripcion} · ${v.especie} ${v.calibre} · ${v.bins} bins`, ts: Date.now() });
  };

  window.eliminarReserva = async (id) => {
    if (!confirm("¿Eliminar esta reserva?")) return;
    const r = reservas[id];
    await remove(ref(db, `reservas/${id}`));
    await push(ref(db, "historial"), { tipo: "correccion", texto: `Reserva eliminada: ${r.cliente} · ${r.especie} ${r.calibre} · ${r.bins} bins`, ts: Date.now() });
  };

  window.eliminarLote = async (id) => {
    const l = lotes[id];
    if (!confirm(`¿Eliminar lote de ${l.bins} bins de ${l.especie} ${l.calibre} (${l.planta} · ${l.fecha})?`)) return;
    await remove(ref(db, `lotes/${id}`));
    await push(ref(db, "historial"), { tipo: "correccion", texto: `Lote eliminado: ${l.especie} ${l.calibre} · ${l.bins} bins · ${l.planta}`, ts: Date.now() });
  };

  window.editarLote = (id) => {
    const l = lotes[id];
    if (!l) return;
    // Mostrar modal de edición
    const modal = document.getElementById("modalEditar");
    document.getElementById("ePlanta").value = l.planta;
    document.getElementById("eEspecie").value = l.especie;
    document.getElementById("eCalibre").value = l.calibre;
    document.getElementById("eFecha").value = l.fecha;
    document.getElementById("eBins").value = l.bins;
    document.getElementById("eLoteId").value = id;
    modal.style.display = "flex";
  };

  window.guardarEdicion = async () => {
    const id = document.getElementById("eLoteId").value;
    const planta = document.getElementById("ePlanta").value;
    const especie = document.getElementById("eEspecie").value;
    const calibre = document.getElementById("eCalibre").value;
    const fecha = document.getElementById("eFecha").value;
    const bins = fmt(document.getElementById("eBins").value);
    if (!bins) return alert("Ingresa cantidad de bins");
    const old = lotes[id];
    await update(ref(db, `lotes/${id}`), { planta, especie, calibre, fecha, bins });
    await push(ref(db, "historial"), { tipo: "correccion", texto: `Lote editado: ${old.especie} ${old.calibre} → ${especie} ${calibre} · ${bins} bins · ${planta}`, ts: Date.now() });
    document.getElementById("modalEditar").style.display = "none";
  };

  window.cerrarModal = () => {
    document.getElementById("modalEditar").style.display = "none";
  };

  window.cerrarDia = async () => {
    if (!confirm("¿Cerrar el día? Las ventas se descuentan del stock. Lo no vendido se acumula. Las reservas se mantienen.")) return;
    // Calcular consumo por especie+calibre
    const consumo = {};
    Object.values(ventas).forEach(v => {
      const k = `${v.especie}|${v.calibre}`;
      consumo[k] = (consumo[k] || 0) + v.bins;
    });
    // Aplicar FIFO: descontar de lotes más antiguos
    const lotesArr = Object.entries(lotes).map(([id, l]) => ({ id, ...l }))
      .sort((a, b) => a.fecha.localeCompare(b.fecha));
    for (const [k, total] of Object.entries(consumo)) {
      const [esp, cal] = k.split("|");
      let restante = total;
      for (const l of lotesArr) {
        if (l.especie !== esp || l.calibre !== cal || restante <= 0) continue;
        const consumido = Math.min(restante, l.bins);
        restante -= consumido;
        const nuevo = l.bins - consumido;
        if (nuevo <= 0) await remove(ref(db, `lotes/${l.id}`));
        else await update(ref(db, `lotes/${l.id}`), { bins: nuevo });
      }
    }
    // Limpiar ventas del día (reservas NO se tocan)
    await set(ref(db, "ventas"), null);
    const totalV = Object.values(ventas).reduce((a, v) => a + v.bins, 0);
    await push(ref(db, "historial"), { tipo: "reset", texto: `Día cerrado · ${totalV} bins descontados · Stock restante acumulado`, ts: Date.now() });
  };

  window.setTab = (t) => { tabActual = t; render(); };
  window.setFiltro = (p) => { filtroPlanta = p; render(); };

  // ── RENDER ──
  function render() {
    const lotesArr = Object.entries(lotes).map(([id, l]) => ({ id, ...l }));
    const reservasArr = Object.entries(reservas).map(([id, r]) => ({ id, ...r }));
    const ventasArr = Object.entries(ventas).map(([id, v]) => ({ id, ...v }));
    const historialArr = Object.entries(historial).map(([id, h]) => ({ id, ...h })).sort((a, b) => b.ts - a.ts);

    const totalStock = lotesArr.reduce((a, l) => a + l.bins, 0);
    const totalReservado = reservasArr.reduce((a, r) => a + r.bins, 0);
    const totalVendido = ventasArr.reduce((a, v) => a + v.bins, 0);
    const disponible = totalStock - totalReservado - totalVendido;

    // Resumen por especie+calibre
    const lotesFiltrados = filtroPlanta === 'Todas' ? lotesArr : lotesArr.filter(l => l.planta === filtroPlanta);
    const stockMap = {};
    lotesFiltrados.forEach(l => {
      const k = `${l.especie}|${l.calibre}`;
      stockMap[k] = (stockMap[k] || 0) + l.bins;
    });

    // Helpers para alertas
    function alertaColor(dias) {
      return dias > 7 ? "#ef5350" : dias >= 5 ? "#ffb74d" : "#555";
    }
    function alertaEmoji(dias) {
      return dias > 7 ? "🔴" : dias >= 5 ? "🟡" : "🟢";
    }

    const sel = `width:100%;box-sizing:border-box;background:#1a1f2e;border:1px solid #333;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;margin-top:8px;`;
    const inp = `width:100%;box-sizing:border-box;background:#1a1f2e;border:1px solid #333;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;`;
    const btn = `margin-top:12px;width:100%;padding:13px;background:#c8a84b;border:none;border-radius:10px;color:#0f1117;font-weight:bold;font-size:15px;cursor:pointer;`;

    const optP = PLANTAS.map(p => `<option>${p}</option>`).join("");
    const optE = ESPECIES.map(p => `<option>${p}</option>`).join("");
    const optC = CALIBRES.map(c => `<option>${c}</option>`).join("");

    // Tabs
    const tabs = [
      { id: "stock", label: "📦 Stock" },
      { id: "reservas", label: "🔒 Reservas" },
      { id: "ventas", label: "💰 Ventas" },
      { id: "historial", label: "📋 Historial" },
    ];
    const tabsHTML = tabs.map(t => `
      <button onclick="setTab('${t.id}')" style="padding:7px 13px;border-radius:20px;border:none;cursor:pointer;font-size:13px;white-space:nowrap;background:${tabActual===t.id?"#c8a84b":"#1a1f2e"};color:${tabActual===t.id?"#0f1117":"#aaa"};font-weight:${tabActual===t.id?"bold":"normal"};">${t.label}</button>
    `).join("");

    // Content por tab
    let content = "";

    if (tabActual === "stock") {
      // Agrupar por especie
      const especiesEnStock = [...new Set(Object.keys(stockMap).map(k => k.split("|")[0]))];
      const stockCards = especiesEnStock.map(esp => {
        const totalEsp = Object.entries(stockMap).filter(([k])=>k.startsWith(esp+"|")).reduce((a,[,v])=>a+v,0);
        const ORDEN_CALIBRES = ["Sobre","Grande","Mediano","Chico","Pre","Sin Cera","Verde"];
        const calibresDeEsp = Object.keys(stockMap).filter(k=>k.startsWith(esp+"|")).map(k=>k.split("|")[1])
          .sort((a,b) => ORDEN_CALIBRES.indexOf(a) - ORDEN_CALIBRES.indexOf(b));
        const calibresHTML = calibresDeEsp.map(cal => {
          const total = stockMap[esp+"|"+cal];
          let consumido = reservasArr.filter(r=>r.especie===esp&&r.calibre===cal).reduce((a,r)=>a+r.bins,0)
                        + ventasArr.filter(v=>v.especie===esp&&v.calibre===cal).reduce((a,v)=>a+v.bins,0);
          const resv = reservasArr.filter(r=>r.especie===esp&&r.calibre===cal).reduce((a,r)=>a+r.bins,0);
          const lotesMatch = lotesFiltrados.filter(l=>l.especie===esp&&l.calibre===cal).sort((a,b)=>a.fecha.localeCompare(b.fecha));
          let restante = consumido;
          const lotesDisp = lotesMatch.map(l => {
            const c = Math.min(restante, l.bins); restante -= c;
            return { ...l, disponible: l.bins - c };
          }).filter(l => l.disponible > 0);
          const dispTotal = lotesDisp.reduce((a,l)=>a+l.disponible,0);
          const lotesHTML = lotesDisp.map(l => {
            const dias = diasDesde(l.fecha);
            const color = alertaColor(dias);
            const emoji = alertaEmoji(dias);
            const label = dias > 7 ? ` · ${dias}d ⚠️ URGENTE` : dias >= 5 ? ` · ${dias}d Atención` : "";
            const bg = dias > 7 ? "background:#ef535018;border-radius:6px;padding:3px 6px;" : dias >= 5 ? "background:#ffb74d11;border-radius:6px;padding:3px 6px;" : "";
            return `<div style="font-size:11px;color:${color};margin-top:3px;${bg};display:flex;justify-content:space-between;align-items:center;">
              <span>${emoji} ${l.fecha} · ${l.planta} · <span style="color:#fff">${l.disponible} bins</span>${label}</span>
              <span>
                <button onclick="editarLote('${l.id}')" style="background:none;border:none;color:#c8a84b;font-size:13px;cursor:pointer;padding:0 4px;">✏️</button>
                <button onclick="eliminarLote('${l.id}')" style="background:none;border:none;color:#ef5350;font-size:13px;cursor:pointer;padding:0 4px;">🗑</button>
              </span>
            </div>`;
          }).join("");
          return `
            <div style="border-left:2px solid #c8a84b55;margin:6px 0 0 6px;padding:5px 0 3px 10px;">
              <div style="display:flex;justify-content:space-between;">
                <span style="color:#c8a84b;font-size:13px;"><strong>${cal}</strong> · ${total} bins</span>
                <span style="font-size:12px;color:${dispTotal<=0?"#ef5350":"#66bb6a"}">libre: ${dispTotal}</span>
              </div>
              ${lotesHTML}
            </div>`;
        }).join("");
        return `
          <div style="background:#1a1f2e;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #ffffff15;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-weight:bold;font-size:16px;">${esp}</span>
              <span style="color:#4fc3f7;font-size:16px;font-weight:bold;">${totalEsp} bins</span>
            </div>
            ${calibresHTML}
          </div>`;
      }).join("");

      content = `
        <div style="font-size:11px;color:#c8a84b;letter-spacing:2px;margin-bottom:10px;">INGRESAR LOTE</div>
        <select id="lPlanta" style="${sel}">${optP}</select>
        <select id="lEspecie" style="${sel}">${optE}</select>
        <select id="lCalibre" style="${sel}">${optC}</select>
        <input type="date" id="lFecha" value="${today()}" style="${sel}">
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button id="btnKilos" onclick="window.modoKilos=true;this.style.background='#c8a84b';this.style.color='#0f1117';this.nextElementSibling.style.background='#1a1f2e';this.nextElementSibling.style.color='#aaa';document.getElementById('lBins').placeholder='Kilos (ej: 4500)';" style="flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;background:#c8a84b;color:#0f1117;font-size:13px;font-weight:bold;">📦 Kilos</button>
          <button id="btnBins" onclick="window.modoKilos=false;this.style.background='#c8a84b';this.style.color='#0f1117';this.previousElementSibling.style.background='#1a1f2e';this.previousElementSibling.style.color='#aaa';document.getElementById('lBins').placeholder='Bins (ej: 10)';document.getElementById('lBinsPreview').textContent='';" style="flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;background:#1a1f2e;color:#aaa;font-size:13px;font-weight:bold;">🗂 Bins</button>
        </div>
        <input type="number" id="lBins" placeholder="Kilos (ej: 4500)" oninput="if(window.modoKilos!==false){var b=this.value?Math.round(this.value/450*10)/10:0;document.getElementById('lBinsPreview').textContent=this.value?'→ '+b+' bins':'';}else{document.getElementById('lBinsPreview').textContent='';}" style="${inp};margin-top:8px;">
        <div id="lBinsPreview" style="color:#c8a84b;font-size:13px;text-align:right;margin-top:4px;"></div>
        <button onclick="addLote()" style="${btn}">+ Ingresar Lote</button>
        ${Object.keys(stockMap).length > 0 ? `
          <div style="font-size:11px;color:#c8a84b;letter-spacing:2px;margin:18px 0 6px;">STOCK ACTUAL</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
            ${["Todas",...PLANTAS].map(p=>`<button onclick="setFiltro('${p}')" style="padding:5px 12px;border-radius:16px;border:none;cursor:pointer;font-size:12px;white-space:nowrap;background:${filtroPlanta===p?'#c8a84b':'#1a1f2e'};color:${filtroPlanta===p?'#0f1117':'#aaa'};">${p}</button>`).join("")}
          </div>
          ${Object.keys(stockMap).length === 0 ? 
            `<div style="color:#555;font-size:14px;padding:10px 0;">Sin stock para esta planta</div>` : 
            stockCards}` : ""}
        <button onclick="cerrarDia()" style="margin-top:16px;width:100%;padding:11px;background:#2a1f1f;border:1px solid #ef5350;border-radius:10px;color:#ef5350;font-size:13px;cursor:pointer;">🔄 Cerrar día</button>
      `;
    }

    if (tabActual === "reservas") {
      const reservasHTML = reservasArr.length === 0
        ? `<div style="color:#555;font-size:14px;">Sin reservas activas</div>`
        : [...reservasArr].sort((a,b)=>a.fechaEntrega.localeCompare(b.fechaEntrega)).map(r => `
          <div style="background:#1a1f2e;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #ffb74d44;">
            <div style="font-weight:bold;font-size:15px;">${r.cliente}</div>
            <div style="color:#c8a84b;font-size:13px;">${r.especie} · ${r.calibre} · ${r.bins} bins</div>
            <div style="color:#ffb74d;font-size:12px;">Entrega: ${r.fechaEntrega}</div>
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button onclick="despachar('${r.id}')" style="padding:7px 14px;background:#66bb6a22;border:1px solid #66bb6a;border-radius:8px;color:#66bb6a;cursor:pointer;font-size:13px;">✅ Despachar</button>
              <button onclick="eliminarReserva('${r.id}')" style="padding:7px 14px;background:#ef535022;border:1px solid #ef5350;border-radius:8px;color:#ef5350;cursor:pointer;font-size:13px;">🗑 Eliminar</button>
            </div>
          </div>`).join("");

      content = `
        <div style="font-size:11px;color:#c8a84b;letter-spacing:2px;margin-bottom:10px;">NUEVA RESERVA (CON PAGO)</div>
        <input id="rCliente" placeholder="Nombre cliente" style="${inp}">
        <select id="rPlanta" style="${sel}">${optP}</select>
        <select id="rEspecie" style="${sel}">${optE}</select>
        <select id="rCalibre" style="${sel}">${optC}</select>
        <input type="number" id="rBins" placeholder="Cantidad bins" style="${inp};margin-top:8px;">

<body style="margin:0;padding:0;background:#0f1117;">
  <div id="app" style="color:#f0ede8;font-family:Georgia,serif;padding:40px 20px;text-align:center;">
    <div style="font-size:30px;margin-bottom:16px;">🍊</div>
    <div style="color:#c8a84b;font-size:16px;">Conectando con Firebase...</div>
    <div style="color:#555;font-size:12px;margin-top:12px;">Si esto no carga, revisa la configuración de Firebase en el archivo</div>
  </div>
  <!-- Modal editar lote -->
  <div id="modalEditar" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000aa;z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#1a1f2e;border-radius:14px;padding:20px;width:90%;max-width:400px;border:1px solid #c8a84b55;">
      <div style="font-size:13px;color:#c8a84b;letter-spacing:2px;margin-bottom:14px;">EDITAR LOTE</div>
      <input type="hidden" id="eLoteId">
      <select id="ePlanta" style="width:100%;box-sizing:border-box;background:#0f1117;border:1px solid #333;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;margin-bottom:8px;">
        <option>Nueva Aurora</option><option>Tamaya</option><option>Broom</option><option>La Placa</option>
      </select>
      <select id="eEspecie" style="width:100%;box-sizing:border-box;background:#0f1117;border:1px solid #333;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;margin-bottom:8px;">
        <option>Naranjas</option><option>Mandarinas</option><option>Limones</option><option>Clementinas</option>
      </select>
      <select id="eCalibre" style="width:100%;box-sizing:border-box;background:#0f1117;border:1px solid #333;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;margin-bottom:8px;">
        <option>Sobre</option><option>Grande</option><option>Mediano</option><option>Chico</option><option>Pre</option><option>Sin Cera</option><option>Verde</option>
      </select>
      <input type="date" id="eFecha" style="width:100%;box-sizing:border-box;background:#0f1117;border:1px solid #333;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;margin-bottom:8px;">
      <input type="number" id="eBins" placeholder="Cantidad bins" style="width:100%;box-sizing:border-box;background:#0f1117;border:1px solid #333;border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;margin-bottom:12px;">
      <div style="display:flex;gap:8px;">
        <button onclick="cerrarModal()" style="flex:1;padding:12px;background:#2a2a2a;border:1px solid #555;border-radius:10px;color:#aaa;font-size:14px;cursor:pointer;">Cancelar</button>
        <button onclick="guardarEdicion()" style="flex:1;padding:12px;background:#c8a84b;border:none;border-radius:10px;color:#0f1117;font-weight:bold;font-size:14px;cursor:pointer;">Guardar</button>
      </div>
    </div>
  </div>
</body>
</html>
